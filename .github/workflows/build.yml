name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore FlipLeaf.slnx

      - name: Build
        run: dotnet build FlipLeaf.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/FlipLeaf.Engine.Tests/FlipLeaf.Engine.Tests.csproj --configuration Release --no-build
